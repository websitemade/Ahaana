<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Heyahaana | Digital Creator & Tech Evangelist. Official links, custom models, and projects.">
    <meta name="author" content="Heyahaana">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Heyahaana | Digital Creator & Tech Evangelist">
    <meta property="og:description" content="Explore custom AI models, tech collaborations, and digital art projects by Heyahaana.">
    <meta property="og:image" content="public/profilepic/ChatGPT Image Jul 9, 2026, 02_39_33 PM.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Heyahaana | Digital Creator">
    <meta property="twitter:description" content="Official links and campaigns for digital creator Heyahaana.">
    <meta property="twitter:image" content="public/profilepic/ChatGPT Image Jul 9, 2026, 02_39_33 PM.png">

    <title>Heyahaana | Digital Creator & Tech Evangelist</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="public/favicon/Faveicona.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- Ambient Background Glows -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    
    <!-- Custom Follower Cursor Glow (Desktop only) -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <div class="container">
        <!-- Profile Header Section -->
        <header class="profile-header fade-in">
            <div class="avatar-wrapper">
                <img id="profile-avatar" src="public/profilepic/ChatGPT Image Jul 9, 2026, 02_39_33 PM.png" alt="Heyahaana Avatar" class="profile-avatar">
                <span class="pulse-indicator"></span>
            </div>
            
            <h1 class="profile-name">
                <span id="profile-name-text">Heyahaana</span>
                <span class="verified-badge" title="Synthesized AI Identity Verified">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 12L11 14L15 10M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            </h1>
            
            <p id="profile-handle" class="profile-handle">@heyahaana</p>
            <p id="profile-bio" class="profile-bio">
                Digital Creator &amp; Tech Evangelist.<br>
                Exploring the intersection of human creativity &amp; machine learning.
            </p>
            

        </header>

        <!-- Main Content Area -->
        <main class="content-area fade-in-delayed">


            <!-- Dynamic Links list -->
            <section id="links-container" class="links-section">
                <!-- Links will be dynamically populated here via app.js -->
            </section>

            <!-- Custom Interactive Share Button -->
            <div class="share-container">
                <button class="share-btn" id="share-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
                        <polyline points="16 6 12 2 8 6"></polyline>
                        <line x1="12" y1="2" x2="12" y2="15"></line>
                    </svg>
                    <span>Share Page</span>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="profile-footer fade-in-delayed">
            <p class="business-inquiry">For sponsorships &amp; collaborations: <a href="mailto:heyahaanavlog@gmail.com">heyahaanavlog@gmail.com</a></p>
            <div class="footer-bottom">
                <p>&copy; 2026 Heyahaana. All rights synthesized.</p>
                <div class="footer-actions">
                    <div class="system-status">
                        <span class="pulse-dot"></span>
                        <span>System v3.1.2 Online</span>
                    </div>
                    <a href="admin.html" class="admin-access-btn" title="Manage Links &amp; Profile">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast" class="toast" role="alert">Link copied to clipboard!</div>

    <!-- Application Script -->
    <script src="app.js?v=2"></script>
</body>
</html>
